<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}JobRadar — PM Jobs in Germany{% endblock %}</title>
  <meta name="description" content="AI-powered job search assistant for Product Manager roles in Germany. Scrapes LinkedIn, Indeed, and Glassdoor weekly." />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="icon" href="{{ url_for('static', filename='quokka.png') }}" type="image/png" />
</head>
<body>

<!-- Mobile Header -->
<header class="mobile-header">
  <div style="display: flex; align-items: center; gap: 8px;">
    <img src="{{ url_for('static', filename='quokka.png') }}" alt="Quokka" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover;" />
    <span style="font-weight: 800; font-size: 16px; letter-spacing: -0.3px;">JobRadar</span>
  </div>
  <button id="menu-toggle" aria-label="Toggle Menu" class="menu-btn">☰</button>
</header>

<!-- Mobile Nav Menu (Overlay) -->
<nav id="mobile-nav" class="mobile-nav">
  <a href="{{ url_for('dashboard') }}" class="mobile-nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
    📊 Dashboard
  </a>
  <a href="{{ url_for('settings_page') }}" class="mobile-nav-item {% if request.endpoint == 'settings_page' %}active{% endif %}">
    ⚙️ Settings
  </a>
  <a href="{{ url_for('history_page') }}" class="mobile-nav-item {% if request.endpoint == 'history_page' %}active{% endif %}">
    🕐 History
  </a>
</nav>

<div class="page-wrapper">

  <!-- Sidebar -->
  <aside class="sidebar" role="navigation" aria-label="Main Navigation">
    <div class="sidebar-logo">
      <div class="logo-icon" aria-hidden="true" style="padding: 0; overflow: hidden; background: none; border-radius: 50%;">
        <img src="{{ url_for('static', filename='quokka.png') }}" alt="Quokka" style="width: 100%; height: 100%; object-fit: cover;" />
      </div>
      <h1>JobRadar</h1>
      <p>Job Scrape</p>
    </div>
    <nav class="sidebar-nav">
      <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}" id="nav-dashboard">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="{{ url_for('settings_page') }}" class="nav-item {% if request.endpoint == 'settings_page' %}active{% endif %}" id="nav-settings">
        <span class="nav-icon">⚙️</span> Settings
      </a>
      <a href="{{ url_for('history_page') }}" class="nav-item {% if request.endpoint == 'history_page' %}active{% endif %}" id="nav-history">
        <span class="nav-icon">🕐</span> History
      </a>
    </nav>
    <div class="sidebar-footer">
      <div>Weekly scrape · Groq AI</div>
      <div style="margin-top:4px; color: var(--accent-green); font-weight: 600;">🟢 Active</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content" role="main">
    {% block content %}{% endblock %}
  </main>

</div>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
